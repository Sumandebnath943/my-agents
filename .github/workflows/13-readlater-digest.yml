# .github/workflows/13-readlater-digest.yml
# NOTE: link CAPTURE is handled by the Inbox Router. This is just the weekly resurfacing email.
name: Read Later Digest
on:
  schedule:
    - cron: "0 4 * * 0"    # Sundays ~9:30 AM IST
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - run: node agents/13-readlater/digest.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
