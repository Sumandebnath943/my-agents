# .github/workflows/01-uptime-6h.yml
# Periodic full status report every 6 hours — always sends.
name: Uptime Sentinel (6-Hourly)
on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - run: node agents/01-uptime/index.js
        env:
          DIGEST: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
