# .github/workflows/02-supabase-keepalive-weekly.yml
# Weekly "all clear" confirmation — sends a healthy digest even when nothing is wrong,
# so you know the keep-alive itself is alive. DIGEST=1 enables the confirmation message.
name: Supabase Keep-Alive (Weekly Digest)
on:
  schedule:
    - cron: "30 2 * * 1"   # Mondays 8:00 AM IST
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - run: node agents/02-supabase-keepalive/index.js
        env:
          DIGEST: "1"
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
